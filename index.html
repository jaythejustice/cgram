<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff" id="theme-color-meta">
    <title>Aizengram | Secure Chat</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <div id="offline-banner" class="offline-banner" style="display: none;">
        <i class="fa-solid fa-wifi"></i> You are currently offline.
    </div>

    <main id="app-container" role="main">
        
        <div id="view-root" style="width: 100%; height: 100%; flex-grow: 1; overflow: hidden; position: relative;"></div>

        <nav id="bottom-nav" class="bottom-nav" style="display: none;">
            <button type="button" class="nav-item active" id="nav-chats" data-route="/inbox">
                <i class="fa-solid fa-comment"></i>
            </button>
            <button type="button" class="nav-item" id="nav-search" data-route="/search">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            <button type="button" class="nav-item" id="nav-profile" data-route="/profile">
                <i class="fa-solid fa-user"></i>
            </button>
        </nav>

        <div id="toast-container" class="toast-container"></div>

    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
